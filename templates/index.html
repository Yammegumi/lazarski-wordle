<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wordle PL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<main class="game-shell">
    <details id="settings-menu" class="settings-menu">
        <summary class="settings-toggle" aria-label="Ustawienia">
            &#9881;
        </summary>
        <nav class="settings-popover" aria-label="Menu ustawien">
            <button id="menu-new-game" class="settings-link settings-action" type="button">NOWA GRA</button>
            <button id="menu-mode-toggle" class="settings-link settings-action" type="button">WERSJA &#321;ATWA</button>
            <a class="settings-link" href="{{ url_for('words_index') }}">S&#321;OWA</a>
            <button id="menu-about" class="settings-link settings-action" type="button">ABOUT ME</button>
        </nav>
    </details>

    <h1 class="title">WORDLE</h1>
    <p id="mode-info" class="mode-info"></p>
    <p id="status" class="status" aria-live="polite"></p>
    <section id="board" class="board" aria-label="Plansza Wordle"></section>
    <section id="keyboard" class="keyboard" aria-label="Klawiatura ekranowa"></section>
</main>

<div id="about-modal" class="about-modal" hidden>
    <div class="about-panel" role="dialog" aria-modal="true" aria-labelledby="about-title">
        <button id="about-close" class="about-close" type="button" aria-label="Zamknij okno">&times;</button>
        <img
            class="about-logo"
            src="{{ url_for('static', filename='images/logo_pl.svg') }}"
            alt="Logo Uczelni Lazarskiego"
        >
        <h2 id="about-title">ABOUT ME</h2>
        <p>
            Projekt wykonany na potrzeb&#281; przedmiotu AI i analiza danych II - projekt prowadzonego przez
            Wojciecha Draba.
        </p>
        <p>
            Projekt zosta&#322; stworzony przez Mateusza &#321;askiego (numer studencki 53758) oraz Oliwi&#281; Regulsk&#261;
            (numer studencki 53906).
        </p>
    </div>
</div>

<script id="game-config" type="application/json">
    {{ {"maxRows": max_rows, "wordLength": word_length}|tojson }}
</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
